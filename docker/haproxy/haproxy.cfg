global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s

listen app
    bind :80
    option forwardfor

    acl host_allowed hdr(host) -i "${HOST}"
    acl blocked_ip src -f /usr/local/etc/haproxy/external.lst
    acl too_many_requests sc_http_req_rate(0) gt 120
    acl allowed_root path -i /
    acl allowed_static_file path -i /drap-logo.png /favicon.ico /robots.txt
    acl allowed_path path_beg -f /usr/local/etc/haproxy/allowed-paths.lst

    stick-table type ip size 100k expire 60s store http_req_rate(10s)
    http-request track-sc0 src

    http-request return status 404 if !host_allowed
    http-request return status 404 if blocked_ip
    http-request return status 404 if !allowed_root !allowed_static_file !allowed_path
    http-request return status 429 hdr Retry-After 60 if too_many_requests

    http-request set-header X-Real-IP %[src]
    http-request set-header X-Forwarded-Proto http

    acl response_is_html res.hdr(Content-Type) -m beg text/html
    acl prerendered_html path -i / /privacy /privacy/

    http-after-response set-header X-Content-Type-Options nosniff
    http-after-response set-header Referrer-Policy strict-origin-when-cross-origin
    http-after-response set-header X-Frame-Options DENY
    http-after-response add-header Content-Security-Policy "frame-ancestors 'none'" if response_is_html prerendered_html

    server app app:3000 check
